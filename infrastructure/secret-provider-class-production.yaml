apiVersion: secrets-store.csi.x-k8s.io/v1alpha1
kind: SecretProviderClass
metadata:
  name: RepoUniqueNormalisedIdentifier-api-vault
  namespace: <production-namespace>
spec:
  provider: azure
  secretObjects:
    - secretName: RepoUniqueNormalisedIdentifier-api
      data:
        - objectName: DbConnectionString
          key: DbConnectionString
      type: Opaque

  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "<identity-id>"
    keyvaultName: "<production-keyvault-name>"
    cloudName: ""
    cloudEnvFileName: ""
    objects: |
      array:
        - |
          objectName: DbConnectionString
          objectAlias: DbConnectionString
          objectType: secret
          objectVersion: ""

    tenantId: "<tenant-id>"
