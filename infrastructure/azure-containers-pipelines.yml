trigger:
  - <target-branch>

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: PipelineVariables
  - name: projectName
    value: "Pellerex.Ecosystem.ManagedApi.RepoUniqueIdentifier"
  - name: dockerRepositoryName
    value: "pellerex/RepoUniqueNormalisedIdentifier"
  - name: feed
    value: "ManagedApiService/External.Latest"

steps:
  - checkout: self
    lfs: true

  - task: CopyFiles@2
    inputs:
      SourceFolder: "infrastructure"
      Contents: "**"
      TargetFolder: "$(Build.ArtifactStagingDirectory)"

  - task: PublishBuildArtifacts@1
    inputs:
      pathtoPublish: "$(Build.ArtifactStagingDirectory)"
      artifactName: "$(projectName)"
    displayName: "Upload Artifacts"

  - task: Docker@2
    inputs:
      repository: "$(dockerRepositoryName)"
      command: "build"
      Dockerfile: "**/Dockerfile"
      arguments: "--build-arg PAT=$(PAT)"
      tags: |
        latest
        v1.0.0

  - task: Docker@2
    displayName: Push
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/<target-branch>')
    inputs:
      command: push
      containerRegistry: "DockerHub"
      repository: "$(dockerRepositoryName)"
      tags: |
        latest
        v1.0.0
